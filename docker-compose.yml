x-api-environment: &api-environment
  DATABASE_URL: ${DOCKER_DATABASE_URL}
  S3_ENDPOINT_URL: ${DOCKER_S3_ENDPOINT_URL}
  OPENSEARCH_URL: ${DOCKER_OPENSEARCH_URL}
  LITELLM_BASE_URL: ${DOCKER_LITELLM_BASE_URL:-}

x-host-gateway: &host-gateway
  - "host.docker.internal:host-gateway"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: runtime
    container_name: agentic-rag-api
    env_file:
      - path: .env
        required: false
    environment:
      <<: *api-environment
    extra_hosts: *host-gateway
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db-seed:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - appnet
      - dbnet
      - storagenet
      - searchnet

  ingestion-worker:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: runtime
    container_name: agentic-rag-ingestion-worker
    command: ["python", "-m", "agentic_rag.workers.ingestion"]
    env_file:
      - path: .env
        required: false
    environment:
      <<: *api-environment
    depends_on:
      db-seed:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      disable: true
    restart: unless-stopped
    networks:
      - dbnet
      - storagenet

  indexing-worker:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: runtime
    container_name: agentic-rag-indexing-worker
    command: ["python", "-m", "agentic_rag.workers.indexing"]
    env_file:
      - path: .env
        required: false
    environment:
      <<: *api-environment
    depends_on:
      db-seed:
        condition: service_completed_successfully
      opensearch:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped
    networks:
      - dbnet
      - searchnet

  embedding-worker:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: runtime
    container_name: agentic-rag-embedding-worker
    command: ["python", "-m", "agentic_rag.workers.embedding"]
    env_file:
      - path: .env
        required: false
    environment:
      <<: *api-environment
    extra_hosts: *host-gateway
    depends_on:
      db-seed:
        condition: service_completed_successfully
    healthcheck:
      disable: true
    restart: unless-stopped
    networks:
      - appnet
      - dbnet

  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentic-rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentic_rag}
      POSTGRES_USER: ${POSTGRES_USER:-agentic_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentic_rag}
      PGDATA: ${PGDATA:-/var/lib/postgresql/data/pgdata}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dbnet

  postgres-init:
    image: pgvector/pgvector:pg16
    container_name: agentic-rag-postgres-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentic_rag}
      POSTGRES_USER: ${POSTGRES_USER:-agentic_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentic_rag}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until pg_isready -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"; do
          echo "[PostgreSQL] Waiting for database..."
          sleep 2
        done
        export PGPASSWORD="$${POSTGRES_PASSWORD}"
        psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -c 'CREATE EXTENSION IF NOT EXISTS vector;'
        echo "[PostgreSQL] Vector extension ready"
    restart: "no"
    networks:
      - dbnet

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: runtime
    container_name: agentic-rag-db-migrate
    command: ["alembic", "upgrade", "head"]
    env_file:
      - path: .env
        required: false
    environment:
      <<: *api-environment
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    restart: "no"
    networks:
      - dbnet

  db-seed:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: runtime
    container_name: agentic-rag-db-seed
    command: ["python", "scripts/seed_local_db.py"]
    env_file:
      - path: .env
        required: false
    environment:
      <<: *api-environment
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: "no"
    networks:
      - dbnet

  minio:
    image: minio/minio:latest
    container_name: agentic-rag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-agentic_rag}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-agentic_rag_password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - storagenet

  minio-init:
    image: minio/mc:latest
    container_name: agentic-rag-minio-init
    depends_on:
      - minio
    environment:
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-agentic_rag}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-agentic_rag_password}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-agentic-rag}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local "$${S3_ENDPOINT_URL}" "$${S3_ACCESS_KEY_ID}" "$${S3_SECRET_ACCESS_KEY}"; do
          echo "[MinIO] Waiting for object storage..."
          sleep 2
        done
        mc mb --ignore-existing "local/$${S3_BUCKET_NAME}"
        mc anonymous set none "local/$${S3_BUCKET_NAME}"
        echo "[MinIO] Bucket ready: $${S3_BUCKET_NAME}"
    restart: "no"
    networks:
      - storagenet

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: agentic-rag-opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: ${OPENSEARCH_DISABLE_SECURITY_PLUGIN:-true}
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - searchnet

networks:
  appnet:
  dbnet:
  storagenet:
  searchnet:

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  opensearch_data:
    driver: local
